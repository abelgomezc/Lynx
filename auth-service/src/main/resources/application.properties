spring.application.name=AUTH-SERVICE
server.port=8081
spring.threads.virtual.enabled=true

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lynx_auth}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

jwt.secret=${JWT_SECRET:lynx_jwt_hs512_secret_minimo_64_caracteres_2024_abel_gomez_seguro_ok}
jwt.expiration=3600000
jwt.refresh-expiration=28800000

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

face.service.url=${FACE_SERVICE_URL:http://localhost:8082}
voice.service.url=${VOICE_SERVICE_URL:http://localhost:8083}

biometria.facial.umbral-similitud=0.4
biometria.voz.umbral-similitud=0.35
biometria.max-intentos-fallidos=3
biometria.minutos-bloqueo=15
biometria.max-intentos-ip=5
biometria.minutos-bloqueo-ip=60
biometria.frases-ttl-segundos=60

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD:redis_lynx_2024}

# Archivo de logs (se crea junto al directorio de ejecución: logs/auth-service.log)
logging.file.name=logs/auth-service.log
logging.level.com.lynx.auth=INFO

management.endpoints.web.exposure.include=health,info
