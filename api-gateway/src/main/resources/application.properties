spring.application.name=api-gateway
server.port=8080
spring.threads.virtual.enabled=true

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**
spring.cloud.gateway.routes[0].filters[0]=CircuitBreaker=name=default,fallbackUri=forward:/fallback/auth

spring.cloud.gateway.routes[1].id=access-service
spring.cloud.gateway.routes[1].uri=lb://ACCESS-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/access/**
spring.cloud.gateway.routes[1].filters[0]=CircuitBreaker=name=default,fallbackUri=forward:/fallback/access

spring.cloud.gateway.routes[2].id=admin-service
spring.cloud.gateway.routes[2].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/admin/**
spring.cloud.gateway.routes[2].filters[0]=CircuitBreaker=name=default,fallbackUri=forward:/fallback/admin

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].exposed-headers=Authorization

jwt.secret=${JWT_SECRET:lynx_jwt_hs512_secret_minimo_64_caracteres_2024_abel_gomez_seguro_ok}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD:redis_lynx_2024}

resilience4j.circuitbreaker.instances.default.sliding-window-size=10
resilience4j.circuitbreaker.instances.default.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.default.wait-duration-in-open-state=10s

# La transcripción de voz (Whisper en CPU) puede tardar varios segundos.
# Se amplían los timeouts para que no corte con 504/503.
resilience4j.timelimiter.instances.default.timeout-duration=120s
spring.cloud.gateway.httpclient.response-timeout=120s
spring.cloud.gateway.httpclient.connect-timeout=5000

# Permite cuerpos multipart de audio sin límite estricto
spring.codec.max-in-memory-size=20MB

management.endpoints.web.exposure.include=health,info
