spring.application.name=NOTIFICATION-SERVICE
server.port=8085
spring.threads.virtual.enabled=true

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=notification-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=java.util.HashMap

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:tu_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:tu_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Correo del administrador que recibe las alertas de seguridad
lynx.admin.email=${ADMIN_EMAIL:admin@lynx.com}

# El health del correo se desactiva: en local no hay SMTP real y no debe
# tumbar el estado del servicio (el envío se registra en el log).
management.health.mail.enabled=false
management.endpoints.web.exposure.include=health,info
