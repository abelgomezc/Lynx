services:
  # ------------------------- Infraestructura -------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lynx-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # 5433 en el host para no chocar con un PostgreSQL local en 5432
      - "5433:5432"
    volumes:
      - lynx-pg-data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [lynx-net]

  redis:
    image: redis:7-alpine
    container_name: lynx-redis
    command: ["redis-server", "--requirepass", "redis_lynx_2024"]
    ports:
      - "6379:6379"
    networks: [lynx-net]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: lynx-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [lynx-net]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: lynx-kafka
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks: [lynx-net]

  # ------------------------- Aplicación -------------------------
  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: lynx-eureka
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [lynx-net]

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: lynx-gateway
    depends_on: [eureka-server, redis]
    ports:
      - "8080:8080"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      REDIS_HOST: redis
      REDIS_PASSWORD: redis_lynx_2024
    networks: [lynx-net]

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: lynx-auth
    depends_on:
      postgres: { condition: service_healthy }
      eureka-server: { condition: service_started }
      kafka: { condition: service_started }
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lynx_auth
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PASSWORD: redis_lynx_2024
      FACE_SERVICE_URL: http://face-service:8082
      VOICE_SERVICE_URL: http://voice-service:8083
    networks: [lynx-net]

  face-service:
    build:
      context: .
      dockerfile: face-service/Dockerfile
    container_name: lynx-face
    depends_on:
      postgres: { condition: service_healthy }
      eureka-server: { condition: service_started }
      kafka: { condition: service_started }
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lynx_biometria
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks: [lynx-net]

  voice-service:
    build:
      context: ./voice-service
      dockerfile: Dockerfile
    container_name: lynx-voice
    ports:
      - "8083:8083"
    networks: [lynx-net]

  access-service:
    build:
      context: .
      dockerfile: access-service/Dockerfile
    container_name: lynx-access
    depends_on:
      postgres: { condition: service_healthy }
      eureka-server: { condition: service_started }
      kafka: { condition: service_started }
    ports:
      - "8084:8084"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lynx_accesos
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks: [lynx-net]

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: lynx-notification
    depends_on:
      eureka-server: { condition: service_started }
      kafka: { condition: service_started }
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks: [lynx-net]

  lynx-ui:
    build:
      context: ./lynx-ui
      dockerfile: Dockerfile
    container_name: lynx-ui
    depends_on: [api-gateway]
    ports:
      - "5173:80"
    networks: [lynx-net]

volumes:
  lynx-pg-data:

networks:
  lynx-net:
    driver: bridge
